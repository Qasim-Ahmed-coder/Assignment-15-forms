    <h1>Basic Html Form</h1>
<form>
    <fieldset>
    <legend>Name</legend>
    <p>First name:
    <input type="text">
    </p>
    <p>Last name:
    <input type="text">
    </fieldset>
    </p>
    <fieldset>
    <legend>Other questions</legend>
    <p>Choose a drink:<br>
    <input type="radio" name="drink" value="coffee">Coffee<br>
    <input type="radio" name="drink" value="cold drinks" checked>Cold drinks<br>
    <input type="radio" name="drink" value="hot chocolate">Hot chocolate 
    </p>
    <p>What ice-cream do you like:<br>
    <input type="radio" name="ice-cream" value="chocolate">Chocolate<br> 
    <input type="radio" name="ice-cream" value="strawberry" checked>Strawberry<br> 
    <input type="radio" name="ice-cream" value="kulfa">Kulfa<br>
    <input type="radio" name="ice-cream" value="vanilla">Vanilla<br>
    <input type="radio" name="ice-cream" value="cookies and cream">cookies and cream<br>
    </p>
    <p>Select your school:<br>
<select name="school">
<option value="Happy palace">Happy palace</option>
<option value="city school">City school</option>
<option value="beaconhouse">Beaconhouse</option>
<option value="profectous">Profectus</option>
<option value="akesp">Aga khan</option>
</select>
    </p>
    <p>Give feedback:<br>
    <textarea name="comment" cols="20" rows="7"></textarea>
    </p>
    </fieldset>
    <p>
    <a href="submit.html">
    <input type="submit" name="submit" value="submit">
    </a>
</form>
